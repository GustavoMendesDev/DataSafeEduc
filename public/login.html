<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataSafe | Login</title>
    <script src="./js/sessao.js"></script>
    <link rel="icon" href="./assets/imgs/logo.png" type="img">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="icon" href="./assets/icon/favicon2.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
</head>

<body>
    <main>
        <div class="container-formulario">

            <a class="ancora" href="./index.html"><img class="voltar" src="./assets/icon/arrow_back.png" alt=""></a>

            <!-- logo acima -->
            <img src="./assets/imgs/logoDataSafeRemastered-removebg-preview.png" id="Logo"> 

            <div class="input">
                <label for="nome" id="nome_input">Nome Completo:</label><br>
                <input type="text" id="nome">
            </div>

            <!-- <div class="input">
            <label for="email" id="email_input">Endereço de e-mail:</label><br>
            <input type="text" id="email">
        </div> -->

            <div class="input">
                <label for="senha" id="senha_input">Senha:</label><br>
                <input type="text" id="senha">
            </div>

            <button onclick="entrar()">Entrar</button>

            <p class="sub-titulo">Ainda não tem uma conta? <a href="./cadastro.html">Cadastre-se</a></p>
        </div>

        <div class="container">
            <h1 class="titulo">Bem-vindo de volta à DataSafe!</h1>
        </div>

    </main>
</body>
</html>

<script>


    function entrar() {
        // aguardar();

        var nomeVar = nome_input.value;
        // var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (nome_input == "" || senhaVar == "") {
            // cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            // finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM NOME:", nomeVar);
        // console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        setTimeout(function () {
            window.location = "educacional-dash.html";
        }, 1000); // apenas para exibir o loading

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                // emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.NOME_USUARIO = json.nome;
                    // sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "educacional-dash.html.html";
                    }, 1000);
                });

            } else {
                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }
</script>
