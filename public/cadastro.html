<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AquaTech | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/cadastro.css">

</head>

<body>
  <main>
    <div class="container">
      
      <a class="ancora" href="./index.html" ><img class="voltar" src="./assets/icon/arrow_back.png" alt=""></a>

      <h1>Bem vindo à DataSafe!</h1>

    </div>

    <div class="container-formulario">

      <a class="ancora sub" href="./index.html" ><img class="voltar" src="./assets/icon/arrow_back.png" alt=""></a>

        <img src="./assets/imgs/datasafe-removebg-preview.png" alt="" class="sub">

      <div class="input">
        <label for="nome" id="nome_input">Nome Completo:</label><br>
        <input type="text" id="nome">
      </div>

      <div class="input">
        <label for="email" id="email_input">Endereço de e-mail:</label><br>
        <input type="text" id="email">
      </div>

      <div class="input">
        <label for="celular" id="numero_input">Número de celular:</label><br>
        <input type="text" id="celular">
      </div>

      <div class="input">
        <label for="mensagem" id="senha_input">Senha:</label><br>
        <input type="text" id="mensagem">
      </div>

      <button onclick="cadastrar()">Cadastrar</button>

      <p>Já tem uma conta? <a href="./login.html">Entrar</a></p>
    </div>

  </main>
</body>

</html>

<script>
  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome.value;
    var emailVar = email.value;
    var numeroVar = celular.value;
    var senhaVar = mensagem.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      numeroVar == "" ||
      senhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        celularServer: numeroVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
