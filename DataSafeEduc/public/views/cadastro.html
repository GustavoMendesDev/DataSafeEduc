<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DataSafe | Cadastro</title>

  <script src="../js/sessao.js"></script>

  <link rel="stylesheet" href="../css/cadastro.css">
  <link rel="icon" href="../assets/imgs/logo.png" type="img">

</head>

<body>
  <main>
    <div class="container">
      
      <a class="ancora" href="./index" ><img class="voltar" src="../assets/icon/arrow_back.png" alt=""></a>


      <h1>Cadastre-se na <br>Datasafe</h1>

    </div>

    <div class="container-formulario">

      <img src="../assets/imgs/logoDataSafeRemastered-removebg-preview.png" id="Logo">


      <a class="ancora sub" href="./index" ><img class="voltar" src="../assets/icon/arrow_back.png" alt=""></a>

        <img src="../assets/imgs/datasafe-removebg-preview.png" alt="" class="sub">

      <div class="input">
        <label for="nome" id="nome_input">Nome Completo:</label><br>
        <input type="text" id="nome">
      </div>

      <div class="input">
        <label for="mensagem" id="senha_input">Senha:</label><br>
        <input type="password" id="senha">
      </div>

      <button onclick="cadastrar()">Cadastrar</button>

      <p>Já tem uma conta? <a href="./login">Entrar</a></p>
    </div>

  </main>
</body>

</html>

<script>
  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome.value;
    var senhaVar = senha.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      senhaVar == ""
    ) {
      // cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      // finalizarAguardar();
      return false;
    } 

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          // cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          // finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        // finalizarAguardar();
      });

    return false;
  }

  // function sumirMensagem() {
  //   cardErro.style.display = "none";
  // }

  module.exports = {
    autenticar,
    cadastrar
};
</script>
